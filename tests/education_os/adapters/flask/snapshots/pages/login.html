<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Login</title>
  <style>
    body {
      margin: 0;
      font-family: "Source Serif 4", "Iowan Old Style", "Palatino Linotype", Palatino, serif;
      background: var(--background, #F4F6F9);
      color: var(--text-primary, #1E2430);
      min-height: 100vh;
    }
    .eos-shell {
      max-width: 56rem;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 3.5rem;
    }
    .eos-shell[data-width="wide"] { max-width: 72rem; }
    .eos-shell[data-width="narrow"] { max-width: 28rem; }
    .eos-shell[data-width="wide"][data-page="dashboard"] { max-width: 64rem; }
    .eos-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      margin-bottom: 2rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.95rem;
    }
    .eos-nav a {
      color: var(--primary, #3B4FB8);
      text-decoration: none;
      border-radius: 0.35rem;
      transition: color var(--transition-fast, 150ms) ease-out,
                  opacity var(--transition-fast, 150ms) ease-out;
    }
    .eos-nav a:focus-visible,
    .eos-cta-row a:focus-visible,
    .eos-btn-primary:focus-visible,
    .eos-panel-action:focus-visible,
    .eos-quick-actions a:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--primary, #3B4FB8) 45%, transparent);
      outline-offset: 2px;
    }
    .eos-cta-row { display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 1.25rem 0 0; align-items: center; }
    .eos-cta-row a,
    .eos-cta-row button {
      text-decoration: none;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      transition: transform var(--transition-press, 100ms) ease-out,
                  opacity var(--transition-fast, 150ms) ease-out,
                  box-shadow var(--transition-base, 200ms) ease-out;
    }
    .eos-cta-row a:hover,
    .eos-cta-row button:hover {
      transform: translateY(-1px);
    }
    .eos-btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.4rem;
      border-radius: 0.75rem;
      background: var(--primary, #3B4FB8);
      color: var(--on-primary, #F8FAFC);
      font-weight: 600;
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(13, 27, 42, 0.05));
      min-width: 12rem;
    }
    .eos-btn-primary:hover { opacity: 0.96; }
    .eos-surface {
      transition: opacity var(--transition-base, 200ms) ease-out;
    }
    .eos-success {
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--success, #0F766E);
      margin: 0.75rem 0;
    }
    .eos-readiness-change {
      font-family: "IBM Plex Sans", sans-serif;
      margin: 0.5rem 0 1rem;
    }
    .eos-form label { display: block; margin: 0.75rem 0 0.25rem; font-family: "IBM Plex Sans", sans-serif; }
    .eos-form input, .eos-form select, .eos-form textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--border, #D5DAE3);
      border-radius: 0.4rem;
      font: inherit;
    }
    .eos-stage {
      font-family: "IBM Plex Sans", sans-serif;
      margin: 0.75rem 0;
    }
    .eos-error { color: var(--danger, #C81E1E); font-family: "IBM Plex Sans", sans-serif; }
    .eos-greeting { margin: 0.5rem 0 1rem; }
    /* PX-003 decision screen */
    .eos-hero {
      margin: 0 0 2.5rem;
      padding: 2rem 0 2.25rem;
    }
    .eos-hero-greeting {
      margin: 0 0 1.25rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 1.05rem;
      color: var(--text-secondary, #4A5568);
    }
    .eos-hero-eyebrow {
      margin: 0 0 0.5rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted, #5C6570);
    }
    .eos-hero-title {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 4.5vw, 2.85rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.12;
      max-width: 18ch;
    }
    .eos-hero-duration {
      margin: 0 0 1rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.95rem;
      color: var(--text-secondary, #4A5568);
    }
    .eos-hero-purpose {
      margin: 0;
      max-width: 36rem;
      font-size: 1.15rem;
      line-height: 1.55;
      color: var(--text-secondary, #4A5568);
    }
    .eos-secondary {
      display: grid;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .eos-tertiary {
      display: grid;
      gap: 1.25rem;
    }
    .eos-panel {
      background: var(--surface, #FFFFFF);
      border: 1px solid var(--border-subtle, #E6E9EF);
      border-radius: 1rem;
      padding: 1.35rem 1.4rem;
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(13, 27, 42, 0.05));
      transition: box-shadow var(--transition-base, 200ms) ease-out;
    }
    .eos-panel--quiet {
      box-shadow: none;
    }
    .eos-panel-eyebrow {
      margin: 0 0 0.4rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted, #5C6570);
    }
    .eos-panel-title {
      margin: 0 0 0.65rem;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.015em;
    }
    .eos-panel-metric {
      margin: 0 0 0.35rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--primary, #3B4FB8);
    }
    .eos-panel-trend,
    .eos-panel-body,
    .eos-story,
    .eos-coach-insight {
      margin: 0 0 0.65rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.98rem;
      line-height: 1.55;
      color: var(--text-secondary, #4A5568);
    }
    .eos-panel-action {
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-weight: 600;
      color: var(--primary, #3B4FB8);
      text-decoration: none;
    }
    .eos-milestone-list,
    .eos-quick-actions {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    .eos-milestone-title,
    .eos-quick-actions a {
      font-weight: 600;
      color: var(--text-primary, #1E2430);
      text-decoration: none;
    }
    .eos-milestone-meta,
    .eos-milestone-detail,
    .eos-quick-detail {
      display: block;
      margin-top: 0.2rem;
      color: var(--text-secondary, #4A5568);
      font-size: 0.9rem;
    }
    @media (min-width: 768px) {
      .eos-shell { padding: 2.25rem 1.75rem 4rem; }
      .eos-hero { padding: 2.5rem 0 2.75rem; }
      .eos-secondary {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1.5rem;
      }
      .eos-tertiary {
        grid-template-columns: 1.2fr 1fr;
        gap: 1.5rem;
      }
    }
    @media (min-width: 1280px) {
      .eos-shell[data-width="wide"][data-page="dashboard"] {
        max-width: 72rem;
      }
      .eos-hero-title { max-width: 22ch; }
    }
    @media (max-width: 767px) {
      .eos-btn-primary { width: 100%; }
      .eos-hero { margin-bottom: 1.75rem; padding-bottom: 1.5rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .eos-nav a,
      .eos-cta-row a,
      .eos-cta-row button,
      .eos-surface,
      .eos-panel {
        transition: none;
      }
      .eos-cta-row a:hover,
      .eos-cta-row button:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div
    class="eos-shell"
    data-page="login"
    data-width="narrow"
    data-action-key=""
  >
    <main id="main" role="main">
<header role="banner" aria-label="Student Login">
  <h1>Student Login</h1>
  <p>Enter your student identity to open the learning dashboard.</p>
  <p><a href="/eos/auth/login">Use production authentication</a></p>
</header>
<form class="eos-form" method="post" action="/eos/login/" aria-label="Student login">
  <label for="student_id">Student ID</label>
  <input id="student_id" name="student_id" value="" required autocomplete="username">
  <div class="eos-cta-row">
    <button type="submit">Continue to dashboard</button>
  </div>
</form>
    </main>
  </div>
  <script>
    (function () {
      try {
        var key = "eos-scroll:" + (location.pathname + location.search);
        var saved = sessionStorage.getItem(key);
        if (saved) {
          var y = parseInt(saved, 10);
          if (!isNaN(y)) {
            window.scrollTo(0, y);
          }
        }
        window.addEventListener("pagehide", function () {
          sessionStorage.setItem(key, String(window.scrollY || 0));
        });
      } catch (e) {
        /* scroll restoration is best-effort */
      }
    })();
  </script>
</body>
</html>
