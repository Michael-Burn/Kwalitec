name: Kwalitec CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  architecture:
    name: Architecture Governance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run architecture governance gates
        run: python -m pytest tests/architecture/ -v --tb=short

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [architecture]
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: >
          python -m pytest
          tests/education_os/
          tests/domain/
          tests/architecture/
          -v --tb=short

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [architecture]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: >
          python -m pytest
          tests/
          app/founder/knowledge_engine/tests/
          app/founder/capability_archive/tests/
          app/founder/internal_alpha/tests/
          app/founder/operational_state/tests/
          app/founder/recommendations/tests/
          app/founder/briefing/tests/
          app/founder/dashboard/tests/
          app/founder/internal_alpha_workflow/tests/
          app/automation/tests/
          tests/certification/
          -v --tb=short
          --ignore=tests/architecture

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [architecture]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install lint tools
        run: pip install ruff

      - name: Run ruff check
        run: ruff check app/ src/ tests/ --ignore=F401

  production-gates:
    name: Production Gates
    runs-on: ubuntu-latest
    needs: [architecture, unit, integration, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      - name: Ruff (critical — no ignores for errors beyond F401)
        run: ruff check app/ src/ tests/ --ignore=F401

      - name: PR-001 + GA-001 production readiness tests
        run: >
          python -m pytest
          tests/test_pr001_production_readiness.py
          tests/operational/
          tests/ga/
          -v --tb=short

      - name: Migration scripts load
        run: |
          python - <<'PY'
          from pathlib import Path
          from alembic.script import ScriptDirectory
          root = Path("migrations")
          scripts = ScriptDirectory(str(root))
          head = scripts.get_current_head()
          assert head, "No Alembic head"
          print("Alembic head:", head)
          assert head == "202607230002", head
          PY

      - name: Security dependency scan
        run: |
          set +e
          pip-audit -r requirements.txt --progress-spinner=off | tee pip-audit.txt
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::pip-audit reported dependency findings (exit $status)."
            echo "Review pip-audit.txt and docs/release/DEPENDENCY_AUDIT_V2.md before release."
            # Soft gate: warn in CI; hard-fail once the dependency baseline is clean.
            exit 0
          fi
          echo "pip-audit clean"

      - name: Production + GA docs present
        run: |
          test -f docs/production/DEPLOYMENT.md
          test -f docs/production/ENVIRONMENT.md
          test -f docs/production/RUNBOOK.md
          test -f docs/production/BACKUP_AND_RECOVERY.md
          test -f docs/production/INCIDENT_RESPONSE.md
          test -f docs/production/RELEASE_PROCESS.md
          test -f docs/production/VERSIONING_POLICY.md
          test -f docs/production/CONSOLE_OPERATIONS.md
          test -f docs/production/ACCESSIBILITY_AUDIT.md
          test -f docs/ga/README.md
          test -f docs/ga/RELEASE_CHECKLIST.md
          test -f docs/ga/CERTIFICATION_REPORT.md
          test -f docs/ga/SECURITY_REVIEW.md
          test -f docs/ga/PERFORMANCE_BASELINE.md
          test -f docs/ga/WORKFLOW_VALIDATION.md

  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [architecture, unit, integration, lint, production-gates]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pyyaml pip-audit

      - name: Verify VERSION artefact
        run: |
          test "$(tr -d '[:space:]' < VERSION)" = "2.0.0"
          test -f RELEASE_NOTES_V2.md
          test -f ROADMAP_V3.md

      - name: Verify render.yaml is valid
        run: python -c "import yaml; yaml.safe_load(open('render.yaml')); print('render.yaml OK')"

      - name: Verify legacy app factory
        run: python -c "from app import create_app; app = create_app(); print('App factory OK')"

      - name: Verify Education OS factory
        run: |
          python -c "from web.app import create_app, WebConfig; app = create_app(WebConfig(testing=True)); print('EOS factory OK', app.config.get('APP_VERSION'))"

      - name: Dependency audit
        run: pip-audit -r requirements.txt || true

      - name: Dependency audit artefact present
        run: test -f docs/release/DEPENDENCY_AUDIT_V2.md
