name: Kwalitec CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  architecture:
    name: Architecture Governance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run architecture governance gates
        run: python -m pytest tests/architecture/ -v --tb=short

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [architecture]
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: >
          python -m pytest
          tests/education_os/
          tests/domain/
          tests/architecture/
          -v --tb=short

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [architecture]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: >
          python -m pytest
          tests/
          app/founder/knowledge_engine/tests/
          app/founder/capability_archive/tests/
          app/founder/internal_alpha/tests/
          app/founder/operational_state/tests/
          app/founder/recommendations/tests/
          app/founder/briefing/tests/
          app/founder/dashboard/tests/
          app/founder/internal_alpha_workflow/tests/
          app/automation/tests/
          tests/certification/
          -v --tb=short
          --ignore=tests/architecture

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [architecture]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install lint tools
        run: pip install ruff

      - name: Run ruff check
        run: ruff check app/ src/ tests/ --ignore=F401

  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [architecture, unit, integration, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pyyaml pip-audit

      - name: Verify VERSION artefact
        run: |
          test "$(tr -d '[:space:]' < VERSION)" = "2.0.0"
          test -f RELEASE_NOTES_V2.md
          test -f ROADMAP_V3.md

      - name: Verify render.yaml is valid
        run: python -c "import yaml; yaml.safe_load(open('render.yaml')); print('render.yaml OK')"

      - name: Verify legacy app factory
        run: python -c "from app import create_app; app = create_app(); print('App factory OK')"

      - name: Verify Education OS factory
        run: |
          python -c "from web.app import create_app, WebConfig; app = create_app(WebConfig(testing=True)); print('EOS factory OK', app.config.get('APP_VERSION'))"

      - name: Dependency audit
        run: pip-audit -r requirements.txt || true

      - name: Dependency audit artefact present
        run: test -f docs/release/DEPENDENCY_AUDIT_V2.md
