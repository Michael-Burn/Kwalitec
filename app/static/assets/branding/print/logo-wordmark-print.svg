<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 64" role="img" aria-label="Kwalitec">
  <!-- Kwalitec official brand mark — BI-000 hand-built vector (no raster) -->
<!-- PRINT / CMYK conversion targets (approximate):
  - primary_blue: C=67 M=57 Y=0 K=28
  - primary_dark: C=69 M=36 Y=0 K=84
  - deep_navy: C=75 M=45 Y=0 K=84
  - midnight: C=95 M=65 Y=0 K=86
  - gold: C=0 M=24 Y=81 K=9
  - gold_hover: C=0 M=20 Y=73 K=6
  - white: C=0 M=0 Y=0 K=0
  - text_secondary: C=17 M=12 Y=0 K=35
  - divider: C=53 M=34 Y=0 K=76
     Convert to CMYK in a print RIP before plate output. Transparent background. -->
  <text x="0" y="52" fill="#0D1B2A"
    font-family="Inter, Manrope, Sora, system-ui, sans-serif"
    font-size="48" font-weight="600" letter-spacing="-0.02em">Kwalitec</text>
  <circle cx="156.5" cy="17.5" r="5.2" fill="#E8B02B"/>
</svg>
