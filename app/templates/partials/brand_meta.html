{#
  Canonical browser / social brand metadata (BI-001).
  Include from every root layout so favicon, PWA, and OG tags stay consistent.
#}
<link rel="icon" href="{{ versioned_static('branding/favicon.ico') }}" sizes="any">
<link rel="icon" type="image/svg+xml" href="{{ versioned_static('branding/favicon.svg') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ versioned_static('branding/favicon-32.png') }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ versioned_static('branding/favicon-16.png') }}">
<link rel="apple-touch-icon" href="{{ versioned_static('branding/apple-touch-icon.png') }}">
<link rel="manifest" href="{{ versioned_static('branding/manifest.webmanifest') }}">
<meta name="application-name" content="Kwalitec">
<meta name="apple-mobile-web-app-title" content="Kwalitec">
<meta name="theme-color" content="#0D1B2A">
<meta property="og:site_name" content="Kwalitec">
<meta property="og:title" content="{{ title ~ ' · ' if title else '' }}Kwalitec">
<meta property="og:description" content="{{ product_value_proposition }} · {{ product_descriptor }}">
<meta property="og:type" content="website">
<meta property="og:image" content="{{ versioned_static('branding/social-preview.png', _external=True) }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ title ~ ' · ' if title else '' }}Kwalitec">
<meta name="twitter:description" content="{{ product_value_proposition }} · {{ product_descriptor }}">
<meta name="twitter:image" content="{{ versioned_static('branding/social-preview.png', _external=True) }}">
