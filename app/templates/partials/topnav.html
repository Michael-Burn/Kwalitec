<header class="topnav">
    <nav class="navbar">
        <button class="btn btn-outline-secondary btn-sm d-lg-none me-2" type="button" data-sidebar-toggle aria-label="Toggle navigation">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        {% if current_user.is_authenticated %}
        <span class="navbar-text d-none d-sm-inline">{{ current_user.email }}</span>
        {% else %}
        <span class="navbar-text">Kwalitec</span>
        {% endif %}

        <div class="topnav-end">
            <div class="topnav-alpha d-none d-md-flex">
                {% with alpha_badge_variant='full' %}
                    {% include "partials/internal_alpha_badge.html" %}
                {% endwith %}
            </div>
            <div class="appearance-switcher" role="group" aria-label="Appearance">
                <span class="appearance-switcher-label" id="appearance-label">Appearance</span>
                <button type="button"
                        class="appearance-option"
                        data-appearance-option="light"
                        aria-pressed="false"
                        aria-labelledby="appearance-label"
                        title="Light">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                    </svg>
                    <span>Light</span>
                </button>
                <button type="button"
                        class="appearance-option"
                        data-appearance-option="dark"
                        aria-pressed="false"
                        aria-labelledby="appearance-label"
                        title="Dark">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3 7 7 0 0 0 21 14.5z"/>
                    </svg>
                    <span>Dark</span>
                </button>
                <button type="button"
                        class="appearance-option"
                        data-appearance-option="system"
                        aria-pressed="false"
                        aria-labelledby="appearance-label"
                        title="System">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
                    </svg>
                    <span>System</span>
                </button>
            </div>
        </div>
    </nav>
</header>
