{% extends "layouts/auth_base.html" %}

{% block content %}
<main class="error-page" role="main">
    <div>
        <p class="error-code text-secondary">500</p>
        <p class="error-title text-muted">Something Went Wrong</p>
        <p class="error-description">An unexpected error occurred. Please try again later.</p>
        <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary">
            {% if current_user.is_authenticated %}
                Return to Dashboard
            {% else %}
                Sign In
            {% endif %}
        </a>
    </div>
</main>
{% endblock %}
