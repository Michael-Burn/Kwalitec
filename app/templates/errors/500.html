<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Internal Server Error — Kwalitec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="text-center px-3">
            <h1 class="display-1 fw-bold text-danger">500</h1>
            <p class="fs-3"><span class="text-danger">Internal Server Error</span></p>
            <p class="lead text-muted">Something went wrong on our end. The error has been logged and we'll look into it.</p>
            <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary mt-3">
                {% if current_user.is_authenticated %}
                    Return to Dashboard
                {% else %}
                    Sign In
                {% endif %}
            </a>
        </div>
    </div>
</body>
</html>
