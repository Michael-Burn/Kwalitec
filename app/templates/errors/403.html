<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forbidden — Kwalitec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="public-body">
    <main class="error-page" role="main">
        <div>
            <p class="error-code text-warning">403</p>
            <p class="error-title text-danger">Forbidden</p>
            <p class="error-description">You do not have permission to access this resource.</p>
            <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary">
                {% if current_user.is_authenticated %}
                    Return to Dashboard
                {% else %}
                    Sign In
                {% endif %}
            </a>
        </div>
    </main>
    <footer class="public-footer" role="contentinfo">
        <span>Kwalitec v1.1</span>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
