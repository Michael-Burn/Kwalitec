{% extends "layouts/auth_base.html" %}

{% block content %}
<main class="error-page" role="main">
    <div>
        <p class="error-code text-secondary">403</p>
        <p class="error-title text-muted">Access Denied</p>
        <p class="error-description">You do not have permission to view this page.</p>
        <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary">
            {% if current_user.is_authenticated %}
                Return to Dashboard
            {% else %}
                Sign In
            {% endif %}
        </a>
    </div>
</main>
{% endblock %}
