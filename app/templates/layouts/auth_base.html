<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ product_tagline }}">
    <meta name="csrf-token" content="{{ csrf_token() if csrf_token else '' }}">
    <meta name="color-scheme" content="light dark">
    <title>{{ title ~ ' · ' if title else '' }}Kwalitec</title>
    {% include "partials/brand_meta.html" %}
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="public-body">
    <main class="public-main" role="main">
        {% include "partials/flash_messages.html" %}
        {% block content %}{% endblock %}
    </main>

    <div class="appearance-switcher public-appearance" role="group" aria-label="Appearance">
        <span class="appearance-switcher-label" id="public-appearance-label">Appearance</span>
        <button type="button" class="appearance-option" data-appearance-option="light" aria-pressed="false" title="Light">
            <span>Light</span>
        </button>
        <button type="button" class="appearance-option" data-appearance-option="dark" aria-pressed="false" title="Dark">
            <span>Dark</span>
        </button>
        <button type="button" class="appearance-option" data-appearance-option="system" aria-pressed="false" title="System">
            <span>System</span>
        </button>
    </div>

    <footer class="public-footer" role="contentinfo">
        <span>Kwalitec v{{ app_version }}</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
