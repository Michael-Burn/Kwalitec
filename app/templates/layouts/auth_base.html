<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Kwalitec — intelligent exam preparation. Adaptive study plans, daily missions and exam readiness analytics.">
    <meta name="csrf-token" content="{{ csrf_token() if csrf_token else '' }}">
    <title>{{ title ~ ' · ' if title else '' }}Kwalitec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="public-body">
    <main class="public-main" role="main">
        {% include "partials/flash_messages.html" %}
        {% block content %}{% endblock %}
    </main>

    <footer class="public-footer" role="contentinfo">
        <span>Kwalitec v1.1</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
