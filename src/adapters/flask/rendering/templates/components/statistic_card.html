{# Design System — Statistic Card #}
<div
  class="{{ class_name }}"
  {% if style_attr %}style="{{ style_attr }}"{% endif %}
  {% for name, value in a11y_attrs.items() if value is not none and value is not false %}
  {{ name }}{% if value is not sameas true %}="{{ value }}"{% endif %}
  {% endfor %}
>
  <p class="ds-statistic-card__label">{{ component.label }}</p>
  <p class="ds-statistic-card__value">{{ component.value }}</p>
  {% if component.detail %}
  <p class="ds-statistic-card__detail">{{ component.detail }}</p>
  {% endif %}
</div>
