<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  {{ token_css|safe }}
  <style>
    body {
      margin: 0;
      font-family: "Source Serif 4", "Iowan Old Style", "Palatino Linotype", Palatino, serif;
      background:
        radial-gradient(circle at top left, rgba(20, 90, 100, 0.08), transparent 40%),
        linear-gradient(180deg, #f7f4ef 0%, #ebe4d8 100%);
      color: var(--text, #1c1917);
      min-height: 100vh;
    }
    .eos-shell {
      max-width: 56rem;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }
    .eos-shell[data-width="wide"] { max-width: 72rem; }
    .eos-shell[data-width="narrow"] { max-width: 28rem; }
    .eos-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      margin-bottom: 1.5rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.95rem;
    }
    .eos-nav a { color: var(--primary, #0f5c66); text-decoration: none; }
    .eos-nav a:focus-visible {
      outline: 2px solid var(--focus-ring, #0f5c66);
      outline-offset: 2px;
    }
    .eos-cta-row { display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0; }
    .eos-cta-row a { text-decoration: none; }
    .eos-form label { display: block; margin: 0.75rem 0 0.25rem; font-family: "IBM Plex Sans", sans-serif; }
    .eos-form input, .eos-form select, .eos-form textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--border, #d6d3d1);
      border-radius: 0.4rem;
      font: inherit;
    }
    .eos-stage {
      font-family: "IBM Plex Sans", sans-serif;
      margin: 0.75rem 0;
    }
    .eos-error { color: var(--danger, #b42318); font-family: "IBM Plex Sans", sans-serif; }
  </style>
</head>
<body>
  <div class="eos-shell" data-page="{{ page }}" data-width="{{ container_width }}">
    {% block nav %}
    {% if nav %}
    <nav class="eos-nav" aria-label="Student journey">
      <a href="{{ nav.dashboard }}">Dashboard</a>
      <a href="{{ nav.mission }}">Mission</a>
      <a href="{{ nav.session }}">Session</a>
      <a href="{{ nav.reflection }}">Reflection</a>
    </nav>
    {% endif %}
    {% endblock %}
    <main id="main" role="main">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
