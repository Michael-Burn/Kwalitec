<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{{ title }}</title>
  {{ token_css|safe }}
  <style>
    /* PX-004 Product Polish — calm, continuous, accessible */
    :root {
      --eos-touch-min: 2.75rem;
    }
    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
    }
    body {
      margin: 0;
      font-family: "Inter", "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
      background: var(--background, #F4F6F9);
      color: var(--text-primary, #1E2430);
      min-height: 100vh;
    }
    .eos-skip-link {
      position: absolute;
      left: -9999px;
      top: 0.75rem;
      z-index: 1000;
      padding: 0.5rem 1rem;
      background: var(--surface, #fff);
      color: var(--text-primary, #1E2430);
      border-radius: 0.5rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    .eos-skip-link:focus {
      left: 1rem;
      outline: 3px solid color-mix(in srgb, var(--primary, #3B4FB8) 45%, transparent);
      outline-offset: 2px;
    }
    .eos-shell {
      max-width: 56rem;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 3.5rem;
    }
    .eos-shell[data-width="wide"] { max-width: 72rem; }
    .eos-shell[data-width="narrow"] { max-width: 28rem; }
    .eos-shell[data-width="wide"][data-page="dashboard"] { max-width: 64rem; }
    .eos-surface {
      animation: eos-page-enter var(--transition-page, 250ms) ease-out;
    }
    @keyframes eos-page-enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .eos-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      margin-bottom: 1.5rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.95rem;
    }
    .eos-nav a {
      color: var(--primary, #3B4FB8);
      text-decoration: none;
      border-radius: 0.35rem;
      padding: 0.35rem 0.25rem;
      min-height: var(--eos-touch-min);
      display: inline-flex;
      align-items: center;
      transition: color var(--transition-fast, 150ms) ease-out,
                  opacity var(--transition-fast, 150ms) ease-out,
                  background-color var(--transition-fast, 150ms) ease-out;
    }
    .eos-nav a[aria-current="page"] {
      color: var(--text-primary, #1E2430);
      font-weight: 600;
      background: color-mix(in srgb, var(--primary, #3B4FB8) 10%, transparent);
      padding-inline: 0.55rem;
    }
    .eos-nav a:focus-visible,
    .eos-cta-row a:focus-visible,
    .eos-btn-primary:focus-visible,
    .eos-panel-action:focus-visible,
    .eos-quick-actions a:focus-visible,
    .eos-form input:focus-visible,
    .eos-form select:focus-visible,
    .eos-form textarea:focus-visible,
    .eos-form button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--primary, #3B4FB8) 45%, transparent);
      outline-offset: 2px;
    }
    .eos-continuity {
      margin: 0 0 1.5rem;
      padding: 1rem 1.15rem;
      border: 1px solid var(--border-subtle, #E6E9EF);
      border-radius: 1rem;
      background: var(--surface, #fff);
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(13, 27, 42, 0.05));
    }
    .eos-continuity-label {
      margin: 0 0 0.65rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted, #5C6570);
    }
    .eos-continuity-steps {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.85rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.9rem;
      color: var(--text-secondary, #4A5568);
    }
    .eos-continuity-steps li[data-active="true"] {
      color: var(--primary, #3B4FB8);
      font-weight: 600;
    }
    .eos-cta-row { display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 1.25rem 0 0; align-items: center; }
    .eos-cta-row a,
    .eos-cta-row button {
      text-decoration: none;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      min-height: var(--eos-touch-min);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition-press, 100ms) ease-out,
                  opacity var(--transition-fast, 150ms) ease-out,
                  box-shadow var(--transition-base, 200ms) ease-out;
    }
    .eos-cta-row a:hover,
    .eos-cta-row button:hover {
      transform: translateY(-1px);
    }
    .eos-cta-row a:active,
    .eos-cta-row button:active {
      transform: scale(0.98);
    }
    .eos-btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.4rem;
      border-radius: 0.75rem;
      border: 0;
      background: var(--primary, #3B4FB8);
      color: var(--on-primary, #F8FAFC);
      font-weight: 600;
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(13, 27, 42, 0.05));
      min-width: 12rem;
      min-height: var(--eos-touch-min);
      cursor: pointer;
    }
    .eos-btn-primary:hover { opacity: 0.96; }
    .eos-success,
    .eos-success-banner {
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--success, #0F766E);
      background: var(--success-bg, #e6f7f5);
      border: 1px solid color-mix(in srgb, var(--success, #0F766E) 22%, transparent);
      border-radius: 0.75rem;
      padding: 0.85rem 1rem;
      margin: 0 0 1.25rem;
      animation: eos-success-in var(--transition-slow, 250ms) ease-out;
    }
    @keyframes eos-success-in {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .eos-readiness-change {
      font-family: "IBM Plex Sans", sans-serif;
      margin: 0 0 1.25rem;
      color: var(--text-secondary, #4A5568);
    }
    .eos-form {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-width: 36rem;
    }
    .eos-form label {
      display: block;
      margin: 0.85rem 0 0.35rem;
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 600;
      color: var(--text-primary, #1E2430);
    }
    .eos-form .eos-help {
      margin: 0 0 0.35rem;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.875rem;
      color: var(--text-muted, #5C6570);
    }
    .eos-form input,
    .eos-form select,
    .eos-form textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 0.7rem 0.85rem;
      min-height: var(--eos-touch-min);
      border: 1px solid var(--border, #D5DAE3);
      border-radius: 0.75rem;
      font: inherit;
      background: var(--surface, #fff);
      color: var(--text-primary, #1E2430);
      transition: border-color var(--transition-fast, 150ms) ease-out,
                  box-shadow var(--transition-fast, 150ms) ease-out;
    }
    .eos-form textarea { min-height: 7rem; resize: vertical; }
    .eos-form input:focus,
    .eos-form select:focus,
    .eos-form textarea:focus {
      border-color: var(--primary, #3B4FB8);
      box-shadow: var(--focus-ring, 0 0 0 3px rgba(59, 79, 184, 0.28));
      outline: none;
    }
    .eos-form .eos-field-error {
      margin: 0.25rem 0 0;
      color: var(--danger, #C81E1E);
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.875rem;
    }
    .eos-form button[type="submit"] {
      margin-top: 1rem;
      align-self: flex-start;
      padding: 0.85rem 1.4rem;
      border-radius: 0.75rem;
      border: 0;
      background: var(--primary, #3B4FB8);
      color: var(--on-primary, #F8FAFC);
      font-weight: 600;
      min-height: var(--eos-touch-min);
      cursor: pointer;
    }
    .eos-stage {
      font-family: "IBM Plex Sans", sans-serif;
      margin: 0.75rem 0;
    }
    .eos-error {
      color: var(--danger, #C81E1E);
      font-family: "IBM Plex Sans", sans-serif;
      background: var(--danger-bg, #fef1f1);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
    }
    .eos-greeting { margin: 0.5rem 0 1rem; }
    .eos-empty {
      margin: 0.75rem 0;
      padding: 1.25rem 1.15rem;
      border: 1px dashed var(--border, #D5DAE3);
      border-radius: 1rem;
      background: color-mix(in srgb, var(--surface, #fff) 88%, var(--background, #F4F6F9));
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    .eos-empty__title {
      margin: 0 0 0.4rem;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .eos-empty__description {
      margin: 0;
      color: var(--text-secondary, #4A5568);
      line-height: 1.55;
    }
    .ds-empty-state,
    .ds-toast,
    .ds-skeleton,
    .ds-loading-state {
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    .ds-empty-state {
      padding: 1.25rem 1.15rem;
      border-radius: 1rem;
      border: 1px dashed var(--border, #D5DAE3);
      background: var(--surface, #fff);
    }
    .ds-empty__title { margin: 0 0 0.4rem; font-size: 1.05rem; font-weight: 600; }
    .ds-empty__description,
    .ds-empty__action {
      margin: 0 0 0.35rem;
      color: var(--text-secondary, #4A5568);
      line-height: 1.55;
    }
    .ds-toast {
      border-radius: 0.75rem;
      padding: 0.85rem 1rem;
      margin: 0 0 1.25rem;
    }
    .ds-toast--success {
      color: var(--success, #0F766E);
      background: var(--success-bg, #e6f7f5);
      border: 1px solid color-mix(in srgb, var(--success, #0F766E) 22%, transparent);
    }
    .ds-toast__message { margin: 0; }
    .ds-skeleton {
      display: block;
      min-height: 4.5rem;
      border-radius: 0.75rem;
      background: color-mix(in srgb, var(--border, #D5DAE3) 65%, var(--surface, #fff));
      animation: eos-skeleton-pulse 1.2s ease-out infinite;
    }
    .ds-skeleton--card { min-height: 8rem; padding: 1.25rem; }
    .ds-visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    @keyframes eos-skeleton-pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    /* PX-003 decision screen */
    .eos-hero {
      margin: 0 0 2.5rem;
      padding: 2rem 0 2.25rem;
    }
    .eos-hero-greeting {
      margin: 0 0 1.25rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 1.05rem;
      color: var(--text-secondary, #4A5568);
    }
    .eos-hero-eyebrow {
      margin: 0 0 0.5rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted, #5C6570);
    }
    .eos-hero-title {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 4.5vw, 2.85rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.12;
      max-width: 18ch;
    }
    .eos-hero-duration {
      margin: 0 0 1rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.95rem;
      color: var(--text-secondary, #4A5568);
    }
    .eos-hero-purpose {
      margin: 0;
      max-width: 36rem;
      font-size: 1.15rem;
      line-height: 1.55;
      color: var(--text-secondary, #4A5568);
    }
    .eos-secondary {
      display: grid;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .eos-tertiary {
      display: grid;
      gap: 1.25rem;
    }
    .eos-panel {
      background: var(--surface, #FFFFFF);
      border: 1px solid var(--border-subtle, #E6E9EF);
      border-radius: 1rem;
      padding: 1.35rem 1.4rem;
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(13, 27, 42, 0.05));
      transition: box-shadow var(--transition-base, 200ms) ease-out;
    }
    .eos-panel--quiet { box-shadow: none; }
    .eos-panel-eyebrow {
      margin: 0 0 0.4rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted, #5C6570);
    }
    .eos-panel-title {
      margin: 0 0 0.65rem;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.015em;
    }
    .eos-panel-metric {
      margin: 0 0 0.35rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--primary, #3B4FB8);
    }
    .eos-panel-trend,
    .eos-panel-body,
    .eos-story,
    .eos-coach-insight {
      margin: 0 0 0.65rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.98rem;
      line-height: 1.55;
      color: var(--text-secondary, #4A5568);
    }
    .eos-panel-action {
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-weight: 600;
      color: var(--primary, #3B4FB8);
      text-decoration: none;
      min-height: var(--eos-touch-min);
      display: inline-flex;
      align-items: center;
    }
    .eos-milestone-list,
    .eos-quick-actions {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    .eos-milestone-title,
    .eos-quick-actions a {
      font-weight: 600;
      color: var(--text-primary, #1E2430);
      text-decoration: none;
    }
    .eos-milestone-meta,
    .eos-milestone-detail,
    .eos-quick-detail {
      display: block;
      margin-top: 0.2rem;
      color: var(--text-secondary, #4A5568);
      font-size: 0.9rem;
    }
    /* RR-001 Expandable provenance — keyboard + screen-reader friendly */
    .eos-provenance,
    .eos-hero-provenance {
      margin: 1rem 0 0;
      border: 1px solid var(--border-subtle, #E6E9EF);
      border-radius: 0.75rem;
      background: color-mix(in srgb, var(--surface, #fff) 92%, var(--background, #F4F6F9));
    }
    .eos-provenance__summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      min-height: var(--eos-touch-min);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-weight: 600;
      color: var(--text-primary, #1E2430);
      border-radius: 0.75rem;
    }
    .eos-provenance__summary::-webkit-details-marker { display: none; }
    .eos-provenance__summary::after {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-right: 2px solid var(--text-secondary, #4A5568);
      border-bottom: 2px solid var(--text-secondary, #4A5568);
      transform: rotate(45deg);
      transition: transform var(--transition-fast, 150ms) ease-out;
      flex: 0 0 auto;
    }
    .eos-provenance[open] > .eos-provenance__summary::after {
      transform: rotate(225deg);
    }
    .eos-provenance__summary:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--primary, #3B4FB8) 45%, transparent);
      outline-offset: 2px;
    }
    .eos-provenance__hint {
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--text-secondary, #4A5568);
    }
    .eos-provenance__list {
      margin: 0;
      padding: 0 1rem 1rem 2rem;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-secondary, #4A5568);
    }
    .eos-provenance__reason { margin: 0.35rem 0; }
    .eos-mission-block h1,
    .eos-mission-block h2 {
      letter-spacing: -0.02em;
    }
    .eos-mission-block section {
      margin: 0 0 1.5rem;
      padding: 1.15rem 1.25rem;
      background: var(--surface, #fff);
      border: 1px solid var(--border-subtle, #E6E9EF);
      border-radius: 1rem;
    }
    @media (min-width: 768px) {
      .eos-shell { padding: 2.25rem 1.75rem 4rem; }
      .eos-hero { padding: 2.5rem 0 2.75rem; }
      .eos-secondary {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1.5rem;
      }
      .eos-tertiary {
        grid-template-columns: 1.2fr 1fr;
        gap: 1.5rem;
      }
    }
    @media (min-width: 1280px) {
      .eos-shell[data-width="wide"][data-page="dashboard"] {
        max-width: 72rem;
      }
      .eos-hero-title { max-width: 22ch; }
    }
    @media (max-width: 767px) {
      .eos-btn-primary,
      .eos-form button[type="submit"] { width: 100%; }
      .eos-hero { margin-bottom: 1.75rem; padding-bottom: 1.5rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .eos-nav a,
      .eos-cta-row a,
      .eos-cta-row button,
      .eos-surface,
      .eos-panel,
      .eos-form input,
      .eos-form select,
      .eos-form textarea,
      .eos-success,
      .eos-success-banner,
      .ds-skeleton,
      .eos-provenance__summary::after {
        animation: none !important;
        transition: none !important;
      }
      .eos-cta-row a:hover,
      .eos-cta-row button:hover,
      .eos-cta-row a:active,
      .eos-cta-row button:active {
        transform: none;
      }
      .ds-skeleton { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <a class="eos-skip-link" href="#main">Skip to content</a>
  <div
    class="eos-shell"
    data-page="{{ page }}"
    data-width="{{ container_width }}"
    data-action-key="{{ primary_action_key or '' }}"
    data-continuity="{{ continuity.origin if continuity else '' }}"
  >
    {% block nav %}
    {% if nav %}
    <nav class="eos-nav" aria-label="Student journey">
      <a
        href="{{ nav.dashboard }}"
        data-journey-surface="home"
        {% if page == 'dashboard' %}aria-current="page"{% endif %}
      >Home</a>
      <a
        href="{{ nav.mission }}"
        data-journey-surface="workspace"
        {% if page == 'mission' %}aria-current="page"{% endif %}
      >Mission</a>
      <a
        href="{{ nav.session }}"
        data-journey-surface="workspace"
        {% if page == 'session' %}aria-current="page"{% endif %}
      >Session</a>
      <a
        href="{{ nav.reflection }}"
        data-journey-surface="reflection"
        {% if page == 'reflection' %}aria-current="page"{% endif %}
      >Reflection</a>
    </nav>
    {% endif %}
    {% endblock %}
    <main id="main" class="eos-surface" role="main" tabindex="-1">
      {% block content %}{% endblock %}
    </main>
  </div>
  <div class="ds-visually-hidden" aria-live="polite" id="eos-live-region"></div>
  <script>
    (function () {
      try {
        var key = "eos-scroll:" + (location.pathname + location.search);
        var saved = sessionStorage.getItem(key);
        if (saved) {
          var y = parseInt(saved, 10);
          if (!isNaN(y)) {
            window.scrollTo(0, y);
          }
        }
        window.addEventListener("pagehide", function () {
          sessionStorage.setItem(key, String(window.scrollY || 0));
        });
      } catch (e) {
        /* scroll restoration is best-effort */
      }

      /* Optimistic nav: mark pending surface before paint of next page */
      document.addEventListener("click", function (event) {
        var link = event.target && event.target.closest
          ? event.target.closest("a[data-journey-surface]")
          : null;
        if (!link || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
          return;
        }
        var shell = document.querySelector(".eos-shell");
        if (shell) {
          shell.setAttribute("data-nav-pending", link.getAttribute("data-journey-surface") || "1");
        }
      });
    })();
  </script>
</body>
</html>
